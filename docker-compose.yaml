services:
  soliplex_web:
    build:
      context: ./src/flutter
      dockerfile: Dockerfile
    #network_mode: "host" # only works on linux
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  soliplex_backend:
    build:
      context: .
      dockerfile: Dockerfile
    #network_mode: "host" # only works on linux
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    privileged: true
    env_file:
      - .env
    command:
      - soliplex-cli
      - serve
      - --host=0.0.0.0
      - --no-auth-mode
      - /app/installation/minimal.yaml
    volumes:
      - ./example:/app/installation
      - ./db:/app/db
      - ./sandbox/workdirs:/app/sandbox/workdirs
      - ./uploads:/app/uploads
