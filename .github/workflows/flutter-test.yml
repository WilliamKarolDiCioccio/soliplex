name: Flutter front-end tests/coverage/linting

on:
  push:
    branches: [main, agui_dash_2, pre-merge]
    paths:
      - 'src/flutter/**'
      - '.github/workflows/flutter-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/flutter/**'
      - '.github/workflows/flutter-test.yml'

# Default working directory for all jobs (monorepo structure)
defaults:
  run:
    working-directory: src/flutter

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Check coverage threshold
        run: |
          # TODO: Increase to 85% as more tests are added
          MIN_COVERAGE=2

          # Extract line coverage
          SUMMARY=$(lcov --summary coverage/lcov.info 2>&1)
          LINE_COVERAGE=$(echo "$SUMMARY" | grep "lines" | sed 's/.*: \([0-9.]*\)%.*/\1/')
          LINE_INT=$(echo "$LINE_COVERAGE" | cut -d. -f1)

          echo "Line coverage: ${LINE_COVERAGE}%"
          echo "Minimum required: ${MIN_COVERAGE}%"

          if [ "$LINE_INT" -lt "$MIN_COVERAGE" ]; then
            echo "::error::Coverage ${LINE_COVERAGE}% is below minimum ${MIN_COVERAGE}%"
            exit 1
          fi

          echo "::notice::Coverage check passed with ${LINE_COVERAGE}%"

      - name: Generate coverage report
        run: |
          genhtml coverage/lcov.info -o coverage/html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/flutter/coverage/html/
          retention-days: 30

  # Phase-specific test jobs (triggered by labels)
  phase-1-tests:
    if: contains(github.event.pull_request.labels.*.name, 'phase-1')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Phase 1 tests only
        run: |
          flutter test \
            test/core/network/server_room_key_test.dart \
            test/core/config/connection_config_test.dart \
            --coverage

      - name: Verify Phase 1 coverage (95%)
        run: |
          sudo apt-get install -y lcov
          SUMMARY=$(lcov --summary coverage/lcov.info 2>&1)
          LINE_COVERAGE=$(echo "$SUMMARY" | grep "lines" | sed 's/.*: \([0-9.]*\)%.*/\1/')
          LINE_INT=$(echo "$LINE_COVERAGE" | cut -d. -f1)

          if [ "$LINE_INT" -lt 95 ]; then
            echo "::error::Phase 1 coverage ${LINE_COVERAGE}% is below required 95%"
            exit 1
          fi

          echo "::notice::Phase 1 coverage check passed with ${LINE_COVERAGE}%"

  phase-2-tests:
    if: contains(github.event.pull_request.labels.*.name, 'phase-2')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Phase 2 tests
        run: |
          flutter test \
            test/core/network/room_session_enhanced_test.dart \
            test/core/network/connection_events_enhanced_test.dart \
            --coverage

      - name: Verify Phase 2 coverage (90%)
        run: |
          sudo apt-get install -y lcov
          SUMMARY=$(lcov --summary coverage/lcov.info 2>&1)
          LINE_COVERAGE=$(echo "$SUMMARY" | grep "lines" | sed 's/.*: \([0-9.]*\)%.*/\1/')
          LINE_INT=$(echo "$LINE_COVERAGE" | cut -d. -f1)

          if [ "$LINE_INT" -lt 90 ]; then
            echo "::error::Phase 2 coverage ${LINE_COVERAGE}% is below required 90%"
            exit 1
          fi

  # Nightly integration tests
  nightly-integration:
    if: github.event_name == 'schedule'
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run full integration test suite
        run: flutter test --coverage

      - name: Upload nightly coverage
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage-${{ github.run_id }}
          path: src/flutter/coverage/
          retention-days: 7
