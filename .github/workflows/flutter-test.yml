name: Flutter Test & Coverage

on:
  push:
    branches: [main, agui_dash_2]
    paths:
      - 'src/agui_dash_2/**'
      - 'src/flutter/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/agui_dash_2/**'
      - 'src/flutter/**'

defaults:
  run:
    working-directory: src/agui_dash_2

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Check coverage threshold
        run: |
          MIN_COVERAGE=85
          SUMMARY=$(lcov --summary coverage/lcov.info 2>&1)
          LINE_COVERAGE=$(echo "$SUMMARY" | grep "lines" | sed 's/.*: \([0-9.]*\)%.*/\1/')
          LINE_INT=$(echo "$LINE_COVERAGE" | cut -d. -f1)
          echo "Line coverage: ${LINE_COVERAGE}%"
          echo "Minimum required: ${MIN_COVERAGE}%"
          if [ "$LINE_INT" -lt "$MIN_COVERAGE" ]; then
            echo "::error::Coverage ${LINE_COVERAGE}% is below minimum ${MIN_COVERAGE}%"
            exit 1
          fi
          echo "::notice::Coverage check passed with ${LINE_COVERAGE}%"

      - name: Generate coverage report
        run: genhtml coverage/lcov.info -o coverage/html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/agui_dash_2/coverage/html/
          retention-days: 30
