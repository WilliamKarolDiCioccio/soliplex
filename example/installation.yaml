#==========================================================================
# Soliplex installation configuration
#==========================================================================

id: "soliplex-conf-default"

#==========================================================================
# Meta-configuration
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/meta/
#
# Register custom "kinds" of entities (tool configurations, MCP client
# toolset configurations, etc.)
#==========================================================================

meta:

  #------------------------------------------------------------------------
  # Register AG-UI feature models so that they can be referenced by
  # their 'name'
  #
  # By default, 'haiku.rag' skills register two features ('rag' and
  # 'analysis'), and the 'bwrap_sandbox' skill registers one
  # ('bubble-sandbox'), # just as if we configured here:
  #
  # agui_features:
  #
  # - name: "rag"
  #   model_klass: "haiku.rag.skills.rag.RAGState"
  #   source: "server"
  #
  # - name: "analysis"
  #   model_klass: "haiku.rag.skills.analysis.AnalysisState"
  #   source: "server"
  #
  # - name: "bubble-sandbox"
  #   model_klass: "soliplex.skills.bwrap_sandbox.SandboxState"
  #   source: "server"
  #------------------------------------------------------------------------

  #------------------------------------------------------------------------
  # Register tool configuration types so that they can be referenced by
  # their 'tool_name'
  #
  # Example (using a hypothetical package):
  #
  # tool_configs:
  # - "my_package.config.MyToolConfig"
  #------------------------------------------------------------------------

  #------------------------------------------------------------------------
  # Register MCP client toolset configuration types so that they can be
  # referenced by their 'kind'.
  #
  # 'soliplex.config.tools.Stdio_MCP_ClientToolsetConfig' and
  # 'soliplex.config.tools.HTTP_MCP_ClientToolsetConfig' are registered
  # by default, just as if we configured here:
  #
  # mcp_toolset_configs:
  # - "soliplex.config.tools.Stdio_MCP_ClientToolsetConfig"
  # - "soliplex.config.tools.HTTP_MCP_ClientToolsetConfig"
  #------------------------------------------------------------------------

  #------------------------------------------------------------------------
  # Register skill configuration types so that they can be referenced by
  # their 'kind'
  #
  # 'soliplex.config.skills.HR_RAG_SkillConfig',
  # 'soliplex.config.skills.HR_Analysis_SkillConfig', and
  # 'soliplex.config.skills.BwrapSandboxSkillConfig'
  # are registered by default, just as if we configured here:
  #
  # skill_configs:
  # - "soliplex.config.skills.HR_RAG_SkillConfig"
  # - "soliplex.config.skills.HR_Analysis_SkillConfig"
  # - "soliplex.config.skills.BwrapSandboxSkillConfig"
  #------------------------------------------------------------------------

  #------------------------------------------------------------------------
  # Register MCP server tool wrapper types so that they can be used to
  # wrap tools from a given tool configuration class.
  #
  # Example (using a hypothetical package):
  #
  # mcp_server_tool_wrappers:
  # - config_klass: "my_package.config.MyToolConfig"
  #   wrapper_klass: "my_package.config.MyMCPWrapper"
  #------------------------------------------------------------------------

  #------------------------------------------------------------------------
  # Register agent configuration types so that they can be referenced by
  # their 'kind'
  #
  # 'soliplex.config.agents.AgentConfig' and
  # 'soliplex.config.agents.FactoryAgentConfig' are registered by default,
  # just as if we configured here:
  #
  # agent_configs:
  # - "soliplex.config.agents.AgentConfig"
  # - "soliplex.config.agents.FactoryAgentConfig"
  #------------------------------------------------------------------------

  #------------------------------------------------------------------------
  # Register implementation functions for different secret source classes
  #
  # By default, these classes are configured to use the corresponding
  # functions in 'soliplex.secrets', just as if we configured here:
  #
  # secret_sources:
  # - config_klass: "soliplex.config.secrets.EnvVarSecretSource"
  #   registered_func: "soliplex.secrets.get_env_var_secret"
  # - config_klass: "soliplex.config.secrets.FilePathSecretSource"
  #   registered_func: "soliplex.secrets.get_file_path_secret"
  # - config_klass: "soliplex.config.secrets.SubprocessSecretSource"
  #   registered_func: "soliplex.secrets.get_subprocess_secret"
  # - config_klass: "soliplex.config.secrets.RandomCharsSecretSource"
  #   registered_func: "soliplex.secrets.get_random_chars_secret"
  #------------------------------------------------------------------------

#==========================================================================
# FastAPI routers
#==========================================================================
# Routers from these Soliplex view modules are registered by default,
#
# - 'soliplex.views.agui'
# - 'soliplex.views.authn'
# - 'soliplex.views.authz'
# - 'soliplex.views.completions'
# - 'soliplex.views.installation'
# - 'soliplex.views.log_ingest'
# - 'soliplex.views.quizzes'
# - 'soliplex.views.rooms'
# - 'soliplex.views'
#
# just as if we configured here:
#
# app_router_operations:
#    - kind: "clear"
#    - kind: "add"
#      group_name: "views"
#      router_name: 'soliplex.views.router'
#      prefix: "/api"
#    ...
#    - kind: "add"
#      grouop_name: "rooms"
#      router_name: 'soliplex.views.agui.router'
#      prefix: "/api"
#
# To add a new router without clearing the defaults, e.g. the router
# from 'soliplex.views.streaming', which is not configured by default:
#
# app_router_operations:
#    - kind: "add"
#      group_name: "streaming"
#      router_name: 'soliplex.views.streaming.router'
#      prefix: "/api"
#
# To remove a router which is configured by, e.g. the router
# from 'soliplex.views.completions':
#
# app_router_operations:
#    - kind: "delete"
#      group_name: "completions"
#==========================================================================

#==========================================================================
# Secrets
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/secrets/
#
# Kept in an external store, such as ASW secret store, GitHub secrets,
# files created by the 'docker compose' 'secrets:' configuration, or
# the secrets store managed by `devenv`'s `secrets` script, secrets are
# expected to be injected into the environment separately.
#==========================================================================

secrets:
  # ----------------------------------------------------------------------
  # API key for Pydantic AI logging / debugging
  # ----------------------------------------------------------------------
  - "LOGFIRE_TOKEN"

  # ----------------------------------------------------------------------
  # Credentials for the Google Maps MCP tool
  #
  # (required in order to test the 'example/rooms/mcptest' tooling).
  # ----------------------------------------------------------------------
  - "GOOGLE_MAPS_API_KEY"

  # ----------------------------------------------------------------------
  # Credentials for Google Gemini
  #
  # (required in order to test the 'example/rooms/gemini_flash' room).
  # ----------------------------------------------------------------------
  - "GEMINI_API_KEY"

  # ----------------------------------------------------------------------
  # MCP room token generation / validation secret
  #
  # If not set in the environment, we generate a random value at startup,
  # which will invalidate any previously-generated MCP room tokens.
  #
  # To generate:
  #
  # $ python3 -c "import secrets; print(secrets.token_hex(32))"
  # ----------------------------------------------------------------------
  - secret_name: "URL_SAFE_TOKEN_SECRET"
    sources:
      - kind: "env_var"
        env_var_name: "SOLIPLEX_URL_SAFE_TOKEN_SECRET"
      - kind: "random_chars"

  # ----------------------------------------------------------------------
  # Session middleware token
  #
  # If not set in the environment, we generate a random value at startup,
  # which will invalidate any existing sessions.
  #
  # To generate:
  #
  # $ python3 -c "import secrets; print(secrets.token_hex(32))"
  # ----------------------------------------------------------------------
  - secret_name: "SESSION_MIDDLEWARE_TOKEN"
    sources:
      - kind: "env_var"
        env_var_name: "SOLIPLEX_SESSION_MIDDLEWARE_TOKEN"
      - kind: "random_chars"

#==========================================================================
# Environment Variables
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/environment/
#
# Unlike secrets, environment variables are configured explicitly as part
# of an installation.
#==========================================================================

environment:
  #------------------------------------------------------------------------
  # OLLAMA provider URL
  #
  # Because this value needs to be locally configured, often even for
  # members of a team working on the same project, this is the *one*
  # environment variable which defaults to pulling its value from the
  # actual shell environment
  #
  # Possible configurations:
  #
  # This version pulls the value from 'os.environ':
  # - "OLLAMA_BASE_URL"
  #
  # You can achieve the same effect by spelling it:
  # - name: "OLLAMA_BASE_URL"
  #
  # This version configures the value explicitly:
  # - name: "OLLAMA_BASE_URL"
  #   value: "http://localhost:11434"
  #------------------------------------------------------------------------
  - "OLLAMA_BASE_URL"

  #------------------------------------------------------------------------
  # 'soliplex': on-disk configuration locations
  #------------------------------------------------------------------------
  - name: "INSTALLATION_PATH"
    value: "file:."

  - name: "RAG_LANCE_DB_PATH"
    value: "file:../db/rag"

  #------------------------------------------------------------------------
  # Non-secret configuration for Logfire
  #------------------------------------------------------------------------
  - name: "LOGFIRE_ENVIRONMENT"
    value: "container"

  - name: "LOGFIRE_SERVICE_NAME"
    value: "soliplex"

  #------------------------------------------------------------------------
  # Expire MCP room server tokens after one hour.
  #------------------------------------------------------------------------
  - name: "MCP_TOKEN_MAX_AGE"
    value: 3600

#==========================================================================
# Global 'haiku-rag' configuration
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/rag/#global-configuration
#==========================================================================

haiku_rag_config_file: "./haiku.rag.yaml"

#==========================================================================
# Agent configurations
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/agents/
#
# Agent configurations which are not bound to rooms / completions, but
# findable by ID from Python code using 'the_installation.get_agent_by_id'
#==========================================================================

agent_configs:
  - id: "default_chat"
    model_name: "gpt-oss:latest"
    system_prompt: |
      You are an expert AI assistant specializing in information retrieval.

      Your answers should be clear, concise, and ready for production use.

      Always provide code or examples in Markdown blocks.

  - id: "alternate_chat"
    model_name: "gpt-oss:20b"
    system_prompt: |
      You are an expert AI assistant specializing in information retrieval.

      Your answers should be clear, concise, and ready for production use.

      Always provide code or examples in Markdown blocks.

  - id: "title"
    model_name: "gpt-oss:latest"

title_agent_config_id: "title"

#==========================================================================
# Upload directory configuraition
#==========================================================================
upload_path: ../uploads

#==========================================================================
# Thread peristence:  SQLAlchemy DBURIs
#==========================================================================
thread_persistence_dburi:
  sync: "sqlite://"
  async: "sqlite+aiosqlite://"

#==========================================================================
# Authorization policy:  SQLAlchemy DBURIs
#==========================================================================
authorization_dburi:
  sync: "sqlite://"
  async: "sqlite+aiosqlite://"

#==========================================================================
# OIDC authentication provider configuration
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/oidc_providers/
#
# Specify one or more filesystem paths to search for OIDC provider configs.
#
# Non-absolute paths will be evaluated relative to the installation directory.
#
# By default, load provider configurations found under the path './oicd',
# just as though we had configured here:
#
# oidc_paths:
# - "./oidc"
#
# To disable authentication, list a single, "null" path, e.g.:
#
# oidc_paths:
#   -
#
# Or run 'soliplex-cli serve --no-auth-mode'
#==========================================================================

#==========================================================================
# Skills configuration
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/skills/
#
# Specify one or more filesystem paths to search for skill configs.
#
# Each path can be either:
#
# - a directory containing its own 'SKILLS.md' file:  this directory
#   will be mapped as a single skill.
#
# - a directory whose immediate subdirectories will be treated as skills
#   IFF they contain a `SKILLS.md` file.
#
# Non-absolute paths will be evaluated relative to the installation directory.
#
# The order of 'skills_paths' in this list controls which skill configuration
# is used for any conflict on skill name:  skills found earlier in the list
# "win" over later ones with the same name.
#
# By default, load skill configurations found under the path './skills',
# just as though we had configured here:
#
# skills_paths:
# - "./skills"
#
# ... but with no discovered skills enabled.
#
# To disable all skilss, list a single, "null" path, e.g.:
#
# skills_paths:
#   -
#==========================================================================

filesystem_skills_paths:
  - "./skills"

skill_configs:
  - skill_name: "bare-bones"
    kind: "filesystem"

# Requires installing 'haiku-skills-image-generation'
# - skill_name: "image-generation"
#   kind: "entrypoint"

#==========================================================================
# Rooms configuration
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/rooms/
#
# Specify one or more filesystem paths to search for room configs.
#
# Each path can be either:
#
# - a directory containing its own 'room_config.yaml' file:  this directory
#   will be mapped as a single room.
#
# - a directory whose immediate subdirectories will be treated as rooms
#   IFF they contain a `room_config.yaml` file.
#
# Non-absolute paths will be evaluated relative to the installation directory.
#
# The order of 'room_paths' in this list controls which room configuration
# is used for any conflict on room ID:  rooms found earlier in the list
# "win" over later ones with the same ID.
#
# By default, load room configurations found under the path './rooms',
# just as though we had configured here:
#
# room_paths:
# - "./rooms"
#
# To disable all rooms, list a single, "null" path, e.g.:
#
# room_paths:
#   -
#==========================================================================

#==========================================================================
# Completions configuration
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/completions/
#
# Specify one or more filesystem paths to search for completion configs.
#
# Each path can be either:
#
# - a directory containing its own 'room_config.yaml' file:  this directory
#   will be mapped as a single completion.
#
# - a directory whose immediate subdirectories will be treated as rooms
#   IFF they contain a `room_config.yaml` file.
#
# Non-absolute paths will be evaluated relative to the installation directory.
#
# The order of 'room_paths' in this list controls which completion
# configuration is used for any conflict on completion ID:  completions
# found earlier in the list "win" over later ones with the same ID.
#
# By default, load completion configurations found under the path
# './completions', just as though we had configured here:
#
# completion_paths:
# - "./completions"
#
# To disable all completions, list a single, "null" path, e.g.:
#
# completion_paths:
#   -
#==========================================================================

#==========================================================================
# Quizzes configuration
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/quizzes/
#
# Specify one or more filesystem paths to search for quiz question files.
#
# Each path should be a directory containing one or more '<quiz_id>.json'
# files.
#
# Non-absolute paths will be evaluated relative to the installation directory.
#
# The order of 'quiz_paths' in this list controls which question file
# configuration is used for any conflict on quiz name:  question files
# found earlier in the list "win" over later ones with the same name.
#
# By default, load quizzes found under the path './quizzes',
# just as though we had configured here:
#
# quizzes_paths:
# - "./quizzes"
#
# To disable all quizzes, list a single, "null" path, e.g.:
#
# quizzes_paths:
#   -
#==========================================================================

#==========================================================================
# Python logging configuration
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/logging/
#==========================================================================
logging_config_file: "./logging.yaml"

logging_headers_map:
  request_id: "X-Request-ID"

logging_claims_map:
  user_id: "email"

#==========================================================================
# Logfire configuration
#==========================================================================
# See: https://soliplex.github.io/soliplex/config/logfire/
#==========================================================================
logfire_config:
  token: "secret:LOGFIRE_TOKEN"
  service_name: "env:LOGFIRE_SERVICE_NAME"
  environment: "env:LOGFIRE_ENVIRONMENT"
# base_url: "env:LOGFIRE_BASE_URL"
# service_version: "env:LOGFIRE_SERVICE_VERSION"
# config_dir: "env:LOGFIRE_CONFIG_DIR"
# data_dir: "env:LOGFIRE_DATA_DIR"
# min_level: "env:LOGFIRE_MIN_LEVEL"
# inspect_arguments: true
# add_baggage_to_attributes: true
# distributed_tracing: false
# scrubbing_patterns:  # list, empty by default
# instrument_pydantic_ai:
#   include_binary_content: false
#   include_content: false
# instrument_fast_api:
#   capture_headers: false
#   excluded_urls:  # list, empty by default
#   record_send_receive: false
#   extra_spans: false
