id: "ask_soliplex"
name: "Ask questions about Soliplex"
description: "Answer your questions about Soliplex using its documentation"
suggestions:
- "What time is it?"
- "Who am I?"
- "What is a Soliplex installation?"
agent:
  template_id: "default_chat"
  system_prompt: |
    Answer the user's question using the ask_with_rich_citations tool.
allow_mcp: false
tools:
  - tool_name: "soliplex.tools.get_current_datetime"
    allow_mcp: false
  - tool_name: "soliplex.tools.get_current_user"
  - tool_name: "soliplex.tools.ask_with_rich_citations"
    rag_lancedb_stem: "rag"
    # Apply HR config overrides local to this room
    #haiku_rag_config: "./haiku.rag.yaml"
