repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version matching your devenv setup
    rev: v0.15.7
    hooks:
      - id: ruff-format
        types: [python]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: ['--multi']
        types: [yaml]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks        
